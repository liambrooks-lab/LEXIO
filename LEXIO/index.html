<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEXIO | Professional TTS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="loginPage" class="auth-container">
        <div class="glass-card">
            <h1>Welcome to LEXIO</h1>
            <p>Please provide your details to continue</p>
            <div class="form-group">
                <input type="text" id="userName" placeholder="Full Name" required>
                <input type="tel" id="userPhone" placeholder="Phone Number" required>
                <input type="email" id="userEmailInput" placeholder="Email ID" required>
                <select id="userRegion">
                    <option value="">Select Region</option>
                    <option value="Asia">Asia</option>
                    <option value="Europe">Europe</option>
                    <option value="North America">North America</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <button id="confirmBtn" class="btn-primary">Confirm & Enter</button>
        </div>
    </div>

    <div id="mainApp" style="display: none;">
        <header>
            <div class="user-welcome">
                <h2 id="greetingText">Hi, User!</h2> </div>
            <h1>Tired of watching out for TTL's and ended up getting paid and expensive TL's ?! 😂</h1>
        </header>

        <main class="container">
            <textarea id="inputText" placeholder="Paste your code or document here..."></textarea>
            <div id="displayText" class="reader-view"></div>

            <div class="controls">
                <select id="voiceSelect"><option>Loading Voices...</option></select>
                <div class="settings">
                    <label>Speed: <input type="range" id="speedRange" min="0.5" max="2" value="1" step="0.1"></label>
                </div>
                <div class="btn-group">
                    <button id="startBtn">Start Reading</button>
                    <button id="pauseBtn" disabled>Pause</button>
                    <button id="resumeBtn" disabled>Resume</button>
                    <button id="stopBtn" disabled>Stop</button>
                </div>
            </div>
        </main>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/speech.js"></script>
    <script src="script.js"></script>
</body>
</html>
