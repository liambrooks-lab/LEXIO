<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#8B5CF6"/>
            <stop offset="100%" stop-color="#10B981"/>
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    
    <!-- L letter -->
    <rect x="60" y="40" width="30" height="100" fill="url(#grad1)" rx="15" filter="url(#glow)"/>
    <rect x="60" y="120" width="70" height="30" fill="url(#grad1)" rx="15" filter="url(#glow)"/>
    
    <!-- Modern sound bars (equalizer style) -->
    <rect x="140" y="80" width="8" height="40" fill="#8B5CF6" rx="4">
        <animate attributeName="height" values="40;60;40" dur="1s" repeatCount="indefinite"/>
    </rect>
    <rect x="156" y="70" width="8" height="60" fill="#10B981" rx="4">
        <animate attributeName="height" values="60;80;60" dur="1.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="172" y="60" width="8" height="80" fill="#8B5CF6" rx="4">
        <animate attributeName="height" values="80;100;80" dur="1.4s" repeatCount="indefinite"/>
    </rect>
    
    <!-- LEXIO text -->
    <text x="20" y="180" font-family="Arial" font-size="24" font-weight="bold" fill="white">LEXIO</text>
</svg>